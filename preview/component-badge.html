<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Education badge</title>
<link rel="stylesheet" href="_shared.css">
<style>
  body { padding: 24px 30px; font-family: var(--font-sans); background: #f6f6f8; color: #1d1d1f; }
  .card { background: #fff; border: 1px solid rgba(29,29,31,0.08); border-radius: 24px; padding: 22px 28px; max-width: 540px; box-shadow: 0 4px 16px rgba(0,0,0,0.05); }
  .meta { font-size: 0.85rem; color: #6e6e73; font-weight: 500; margin-bottom: 6px; }
  h3 { font-size: 1.3rem; font-weight: 700; letter-spacing: -0.02em; margin-bottom: 2px; }
  .school { color: #0071e3; font-weight: 500; font-size: 1rem; }
  .badge { display: inline-block; margin-top: 14px; background: color-mix(in srgb, #0071e3 12%, transparent); color: #0071e3; padding: 4px 16px; border-radius: 999px; font-size: 0.83rem; font-weight: 600; }
</style>
</head>
<body>
  <div class="card">
    <div class="meta">2025 · Cabanatuan City, Philippines</div>
    <h3>B.S. Information Technology</h3>
    <div class="school">Wesleyan University Philippines</div>
    <span class="badge">Best Student</span>
  </div>
</body>
</html>
