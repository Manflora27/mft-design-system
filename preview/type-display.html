<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Display type</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { padding: 28px 36px; font-family: var(--font-sans); background: #fff; color: #1d1d1f; }
  .stack { display: flex; flex-direction: column; gap: 16px; }
  .eyebrow { font-size: 0.8rem; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: #0071e3; }
  .display { font-size: 84px; font-weight: 600; letter-spacing: -0.04em; line-height: 1; color: #1d1d1f; }
  .sub { font-size: 1.5rem; font-weight: 200; color: #6e6e73; letter-spacing: -0.01em; line-height: 1.3; max-width: 540px; }
  .meta { font-family: ui-monospace, Menlo, monospace; font-size: 11px; color: #6e6e73; }
</style>
</head>
<body>
  <div class="stack">
    <div class="eyebrow">AI Developer &amp; Software Engineer</div>
    <div class="display">Hi, I'm Manel.</div>
    <div class="sub">Designer of systems.<br>Solver of problems.</div>
    <div class="meta">SF Pro Text · 600 / 200 · clamp(3.5rem, 9vw, 7rem) · letter-spacing −0.04em</div>
  </div>
</body>
</html>
