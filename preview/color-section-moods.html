<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Section color moods</title>
<link rel="stylesheet" href="_shared.css">
<style>
  body { padding: 18px; background: #050508; color: #f5f5f7; }
  .grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; }
  .mood { aspect-ratio: 1/1.2; border-radius: 14px; display: flex; flex-direction: column; justify-content: flex-end; padding: 10px; font-family: var(--font-sans); }
  .mood .label { font-size: 0.65rem; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: #fff; text-shadow: 0 1px 4px rgba(0,0,0,0.4); }
  .mood .hue { font-size: 0.6rem; opacity: 0.85; color: #fff; text-shadow: 0 1px 4px rgba(0,0,0,0.4); }
</style>
</head>
<body>
  <div class="grid">
    <div class="mood" style="background: radial-gradient(circle at 40% 40%, rgb(10,36,224), rgb(102,15,229));">
      <div class="label">Hero</div><div class="hue">iri 1.00</div>
    </div>
    <div class="mood" style="background: radial-gradient(circle at 40% 40%, rgb(64,10,158), rgb(15,26,133));">
      <div class="label">About</div><div class="hue">iri 0.82</div>
    </div>
    <div class="mood" style="background: radial-gradient(circle at 40% 40%, rgb(0,133,148), rgb(10,64,199));">
      <div class="label">Experience</div><div class="hue">iri 0.90</div>
    </div>
    <div class="mood" style="background: radial-gradient(circle at 40% 40%, rgb(184,102,5), rgb(133,26,82));">
      <div class="label">Education</div><div class="hue">iri 0.72</div>
    </div>
    <div class="mood" style="background: radial-gradient(circle at 40% 40%, rgb(10,158,82), rgb(0,92,179));">
      <div class="label">Skills</div><div class="hue">iri 0.85</div>
    </div>
    <div class="mood" style="background: radial-gradient(circle at 40% 40%, rgb(199,66,10), rgb(158,10,102));">
      <div class="label">Projects</div><div class="hue">iri 0.78</div>
    </div>
    <div class="mood" style="background: radial-gradient(circle at 40% 40%, rgb(10,36,224), rgb(102,15,229));">
      <div class="label">Contact</div><div class="hue">iri 1.00</div>
    </div>
  </div>
</body>
</html>
