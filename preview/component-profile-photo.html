<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Profile photo</title>
<link rel="stylesheet" href="_shared.css">
<style>
  body { margin: 0; padding: 24px; font-family: var(--font-sans); display: flex; gap: 36px; align-items: center;
         background: radial-gradient(circle at 50% 50%, rgba(100,50,200,.35), transparent 60%), linear-gradient(160deg, #0a0e27, #1a1a2e); color: #f5f5f7; min-height: 240px; }
  .photo { width: 180px; height: 180px; border-radius: 50%; overflow: hidden; position: relative; border: 4px solid rgba(255,255,255,0.15); box-shadow: 0 24px 60px rgba(0,0,0,0.50); animation: float 6s ease-in-out infinite; flex-shrink: 0; }
  .photo img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; transition: opacity .4s ease; }
  .hover { opacity: 0; }
  .photo:hover .main { opacity: 0; }
  .photo:hover .hover { opacity: 1; }
  @keyframes float { 0%,100% { transform: translateY(0);} 50% { transform: translateY(-12px);} }
  .meta { font-family: ui-monospace, Menlo, monospace; font-size: 12px; opacity: .85; line-height: 1.7; }
</style>
</head>
<body>
  <div class="photo">
    <img class="main" src="../assets/Manel.jpg" alt="">
    <img class="hover" src="../assets/hover.jpg" alt="">
  </div>
  <div class="meta">
    200 × 200 round<br>
    4px white border @ .80 / dark .15 alpha<br>
    shadow-lg<br>
    6s float loop (−12px sine)<br>
    crossfade default ↔ hover.jpg on hover
  </div>
</body>
</html>
