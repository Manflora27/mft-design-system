<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Spacing scale</title>
<link rel="stylesheet" href="_shared.css">
<style>
  body { padding: 24px 30px; font-family: var(--font-sans); }
  .row { display: flex; flex-direction: column; gap: 8px; }
  .item { display: flex; align-items: center; gap: 16px; }
  .swatch { background: #0071e3; height: 14px; border-radius: 3px; }
  .tag { font-family: ui-monospace, Menlo, monospace; font-size: 11px; color: #6e6e73; width: 110px; }
  .note { font-size: 0.78rem; color: #6e6e73; }
  h3 { font-size: 0.7rem; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: #1d1d1f; margin-bottom: 4px; }
</style>
</head>
<body>
  <h3>8-pt spacing scale</h3>
  <div class="row">
    <div class="item"><div class="tag">--space-1 · 4px</div><div class="swatch" style="width:4px;"></div></div>
    <div class="item"><div class="tag">--space-2 · 8px</div><div class="swatch" style="width:8px;"></div></div>
    <div class="item"><div class="tag">--space-3 · 12px</div><div class="swatch" style="width:12px;"></div></div>
    <div class="item"><div class="tag">--space-4 · 16px</div><div class="swatch" style="width:16px;"></div></div>
    <div class="item"><div class="tag">--space-6 · 24px</div><div class="swatch" style="width:24px;"></div></div>
    <div class="item"><div class="tag">--space-8 · 32px</div><div class="swatch" style="width:32px;"></div></div>
    <div class="item"><div class="tag">--space-10 · 40px</div><div class="swatch" style="width:40px;"></div></div>
    <div class="item"><div class="tag">--space-12 · 48px</div><div class="swatch" style="width:48px;"></div></div>
    <div class="item"><div class="tag">--space-16 · 64px</div><div class="swatch" style="width:64px;"></div></div>
    <div class="item"><div class="tag">--space-20 · 80px</div><div class="swatch" style="width:80px;"></div></div>
    <div class="item"><div class="tag">--space-30 · 120px</div><div class="swatch" style="width:120px;"></div></div>
  </div>
</body>
</html>
