<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Iconography</title>
<link rel="stylesheet" href="_shared.css">
<style>
  body { padding: 24px 30px; font-family: var(--font-sans); background: #f6f6f8; color: #1d1d1f; }
  .grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 16px; }
  .cell { background: #fff; border: 1px solid rgba(29,29,31,0.08); border-radius: 14px; padding: 14px; display: flex; flex-direction: column; align-items: center; gap: 8px; height: 130px; justify-content: center; }
  .icon-tile { width: 44px; height: 44px; border-radius: 12px; background: #1d1d1f; display: grid; place-items: center; padding: 8px; }
  .icon-tile img { width: 100%; height: 100%; object-fit: contain; }
  .social { width: 44px; height: 44px; border-radius: 12px; background: rgba(255,255,255,0.9); border: 1px solid rgba(29,29,31,0.10); padding: 8px; }
  .social img { width: 100%; height: 100%; object-fit: contain; }
  .glyph { font-size: 28px; font-weight: 600; color: #0071e3; }
  .name { font-size: 0.7rem; color: #6e6e73; }
</style>
</head>
<body>
  <div class="grid">
    <div class="cell"><div class="icon-tile"><img src="../assets/icon-dark-mode.svg"></div><div class="name">dark mode</div></div>
    <div class="cell"><div class="icon-tile" style="background:#f5f5f7;"><img src="../assets/icon-light-mode.svg" style="filter: invert(1);"></div><div class="name">light mode</div></div>
    <div class="cell"><img class="social" src="../assets/Facebook.png"><div class="name">facebook</div></div>
    <div class="cell"><img class="social" src="../assets/Github.png"><div class="name">github</div></div>
    <div class="cell"><img class="social" src="../assets/Instagram.png"><div class="name">instagram</div></div>
    <div class="cell"><div class="glyph">→</div><div class="name">U+2192 chevron</div></div>
  </div>
</body>
</html>
