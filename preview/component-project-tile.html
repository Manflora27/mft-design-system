<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Project tile</title>
<link rel="stylesheet" href="_shared.css">
<style>
  body { margin: 0; padding: 24px; font-family: var(--font-sans); color: #1d1d1f;
         background: linear-gradient(160deg, #fafafc, #f0f0f3); }
  .tile {
    background: rgba(255,255,255,0.72);
    backdrop-filter: blur(18px) saturate(160%);
    -webkit-backdrop-filter: blur(18px) saturate(160%);
    border: 1px solid rgba(29,29,31,0.10);
    border-radius: 28px;
    overflow: hidden;
    max-width: 580px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.06);
  }
  .img-wrap { aspect-ratio: 21/9; overflow: hidden; }
  .img-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .body { padding: 22px 28px 24px; }
  h3 { font-size: 1.35rem; font-weight: 700; letter-spacing: -0.02em; margin-bottom: 6px; }
  p { font-size: 0.95rem; color: #6e6e73; line-height: 1.6; margin-bottom: 12px; }
  a { color: #0071e3; font-weight: 600; font-size: 0.95rem; text-decoration: none; display: inline-flex; gap: 4px; }
</style>
</head>
<body>
  <article class="tile">
    <div class="img-wrap"><img src="../assets/project-arduino-rain.jpg" alt=""></div>
    <div class="body">
      <h3>Arduino Rain Detection System</h3>
      <p>A hardware-software integration that detects rainfall and triggers automated responses using Arduino Uno sensors.</p>
      <a>Learn more →</a>
    </div>
  </article>
</body>
</html>
