<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Voice & tone</title>
<link rel="stylesheet" href="_shared.css">
<style>
  body { padding: 24px 30px; font-family: var(--font-sans); background: #f6f6f8; color: #1d1d1f; }
  h3 { font-size: 0.65rem; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: #6e6e73; margin-bottom: 10px; }
  .quotes { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  blockquote { background: #fff; border-left: 2px solid #0071e3; padding: 12px 16px; font-size: 0.95rem; color: #1d1d1f; line-height: 1.5; }
  .note { color: #6e6e73; font-size: 0.78rem; margin-top: 6px; }
</style>
</head>
<body>
  <h3>Section titles always end with a period.</h3>
  <div class="quotes">
    <div>
      <blockquote>"Turning complexity into clarity."</blockquote>
      <div class="note">About — declarative, restrained</div>
    </div>
    <div>
      <blockquote>"Where I've worked."</blockquote>
      <div class="note">Experience — possessive, factual</div>
    </div>
    <div>
      <blockquote>"Tools of the trade."</blockquote>
      <div class="note">Skills — craftsman idiom</div>
    </div>
    <div>
      <blockquote>"Let's connect."</blockquote>
      <div class="note">Contact — warm, low-pressure</div>
    </div>
  </div>
</body>
</html>
