<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Neutrals — Dark theme</title>
<link rel="stylesheet" href="_shared.css">
<style>
  body { padding: 24px; background: linear-gradient(160deg, #0a0e27 0%, #1a1a2e 50%, #0f0c29 100%); color: #f5f5f7; }
  .row2 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
  .sw { border-radius: 14px; padding: 14px; height: 120px; display: flex; flex-direction: column; justify-content: space-between; border: 1px solid rgba(255,255,255,0.10); }
  .sw .name { font-size: 0.68rem; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; opacity: 0.85; }
  .sw .hex { font-family: ui-monospace, Menlo, monospace; font-size: 0.82rem; font-weight: 500; }
  .sw small { font-size: 0.68rem; opacity: 0.78; }
</style>
</head>
<body>
  <div class="row2">
    <div class="sw" style="background:#f5f5f7; color:#1d1d1f;">
      <div><div class="name">Text</div><small>Headings, body</small></div>
      <div class="hex">#f5f5f7</div>
    </div>
    <div class="sw" style="background:#98989d; color:#fff;">
      <div><div class="name">Muted</div><small>Secondary copy, meta</small></div>
      <div class="hex">#98989d</div>
    </div>
    <div class="sw" style="background:#0a0e27; color:#f5f5f7;">
      <div><div class="name">Page base</div><small>Deepest layer</small></div>
      <div class="hex">#0a0e27</div>
    </div>
    <div class="sw" style="background:rgba(28,28,30,0.68); color:#f5f5f7; backdrop-filter: blur(12px);">
      <div><div class="name">Surface · 68%</div><small>Dark glass card</small></div>
      <div class="hex">rgba(28,28,30,.68)</div>
    </div>
  </div>
</body>
</html>
