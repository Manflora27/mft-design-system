<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Buttons</title>
<link rel="stylesheet" href="_shared.css">
<style>
  body { padding: 32px 30px; font-family: var(--font-sans); background: #f6f6f8; }
  h3 { font-size: 0.65rem; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: #6e6e73; margin-bottom: 10px; }
  .row { display: flex; gap: 14px; flex-wrap: wrap; align-items: center; margin-bottom: 22px; }
  .btn-primary { background: #0071e3; color: #fff; padding: 14px 28px; border-radius: 980px; font: 500 1rem var(--font-sans); text-decoration: none; border: none; cursor: pointer; transition: background .2s, transform .2s; display: inline-flex; gap: 6px; align-items: center; }
  .btn-primary:hover { background: #0077ed; transform: translateY(-1px); }
  .btn-ghost { color: #0071e3; padding: 14px 28px; border-radius: 980px; font: 500 1rem var(--font-sans); text-decoration: none; border: 1px solid rgba(29,29,31,0.10); display: inline-flex; gap: 6px; align-items: center; background: transparent; cursor: pointer; }
  .tag { font-family: ui-monospace, Menlo, monospace; font-size: 11px; color: #6e6e73; }
</style>
</head>
<body>
  <h3>Primary &amp; ghost — rest / hover</h3>
  <div class="row">
    <a class="btn-primary">View work →</a>
    <a class="btn-primary" style="background:#0077ed; transform: translateY(-1px);">View work →</a>
    <a class="btn-ghost">About me →</a>
    <a class="btn-ghost" style="border-color:#0071e3; transform: translateY(-1px);">About me →</a>
  </div>
  <div class="tag">Pill radius 980px · padding 14px 28px · weight 500 · always trailing →</div>
</body>
</html>
